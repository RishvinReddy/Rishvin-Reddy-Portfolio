<!DOCTYPE html>
<html lang="en">

<head>
  <link rel="stylesheet" href="animations.css">
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Call To Action Section</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com" rel="preconnect" />
  <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&amp;display=swap"
    rel="stylesheet" />
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#f20d33",
            "background-light": "#f8f5f6",
            "background-dark": "#221013",
          },
          fontFamily: {
            "display": ["Times New Roman"]
          },
          borderRadius: {
            "DEFAULT": "0.25rem",
            "lg": "0.5rem",
            "xl": "0.75rem",
            "full": "9999px"
          },
        },
      },
    }
  </script>
  <style>
    body {
      font-family: 'Space Grotesk', sans-serif;
    }
  </style>
</head>

<body class="bg-slate-50 selection:bg-primary/20 font-serif text-slate-800 relative overflow-x-hidden">
  <!-- Ambient Background -->
  <div
    class="fixed inset-0 -z-10 bg-[radial-gradient(ellipse_at_top_right,_var(--tw-gradient-stops))] from-indigo-100/40 via-slate-50 to-emerald-50/40 opacity-70">
  </div>
  <div class="fixed top-0 left-0 w-full h-full overflow-hidden -z-10 pointer-events-none">
    <div class="absolute -top-[20%] -left-[10%] w-[50%] h-[50%] rounded-full bg-purple-200/20 blur-3xl animate-blob">
    </div>
    <div
      class="absolute top-[20%] -right-[10%] w-[40%] h-[40%] rounded-full bg-emerald-200/20 blur-3xl animate-blob animation-delay-2000">
    </div>
    <div
      class="absolute -bottom-[20%] left-[20%] w-[40%] h-[40%] rounded-full bg-blue-200/20 blur-3xl animate-blob animation-delay-4000">
    </div>
  </div>

  <!-- Top Utility Bar (Premium Dark) -->
  <div id="site-header-placeholder"></div>
  <!-- === ULTIMATE CTA & NEWSLETTER (Combined Premium Footer Capstone) === -->
  <section class="relative py-24 sm:py-32 overflow-hidden">
    <!-- Dynamic Background -->
    <div class="absolute inset-0 bg-slate-900">
      <div class="absolute inset-0 bg-gradient-to-br from-slate-900 via-slate-900 to-indigo-950"></div>
      <!-- Animated Grain/Pattern -->
      <div class="absolute inset-0 opacity-20"
        style="background-image: url('data:image/svg+xml,%3Csvg width=\'60\' height=\'60\' viewBox=\'0 0 60 60\' xmlns=\'http://www.w3.org/2000/svg\'%3E%3Cg fill=\'none\' fill-rule=\'evenodd\'%3E%3Cg fill=\'%239C92AC\' fill-opacity=\'0.2\'%3E%3Cpath d=\'M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z\'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E');">
      </div>
    </div>

    <!-- Glowing Orbs -->
    <div
      class="absolute top-0 right-0 w-[500px] h-[500px] bg-primary/20 rounded-full blur-[100px] pointer-events-none mix-blend-screen animate-pulse">
    </div>
    <div
      class="absolute bottom-0 left-0 w-[500px] h-[500px] bg-indigo-500/20 rounded-full blur-[100px] pointer-events-none mix-blend-screen animate-pulse animation-delay-2000">
    </div>

    <div class="relative container mx-auto px-6 lg:px-20 z-10 text-center">

      <!-- Main Call to Action -->
      <div class="max-w-4xl mx-auto mb-20 ">
        <h2 class="text-4xl sm:text-5xl lg:text-6xl font-extrabold tracking-tight text-white leading-tight mb-8">
          Ready to build something <br />
          <span class="text-transparent bg-clip-text bg-gradient-to-r from-primary to-indigo-400">secure, scalable &
            future-proof?</span>
        </h2>
        <p class="text-lg sm:text-xl text-slate-300 leading-relaxed max-w-2xl mx-auto mb-10">
          From rapid prototyping to production-grade deployment, I help turn complex engineering challenges into
          polished, robust solutions.
        </p>

        <div class="flex flex-col sm:flex-row gap-5 justify-center items-center">
          <a href="Contact_page.html"
            class="group relative px-8 py-4 bg-white text-slate-900 rounded-full font-bold text-lg shadow-xl hover:shadow-2xl hover:bg-slate-50 transition-all duration-300 hover:-translate-y-1 overflow-hidden magnetic-btn">
            <span class="relative z-10 flex items-center gap-2">
              Start a Project
              <svg class="w-5 h-5 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor"
                viewBox="0 0 24 24">
                <path d="M17 8l4 4m0 0l-4 4m4-4H3" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                </path>
              </svg>
            </span>
          </a>
          <a href="Resume_page.html"
            class="px-8 py-4 rounded-full border border-white/20 text-white font-medium hover:bg-white/10 transition-all backdrop-blur-sm magnetic-btn">
            View Resume
          </a>
        </div>
      </div>

      <!-- Glass Newsletter Strip -->
      <div class="max-w-3xl mx-auto  delay-200">
        <div
          class="bg-white/10 backdrop-blur-md border border-white/20 rounded-2xl p-2 sm:p-3 flex flex-col sm:flex-row gap-2 shadow-2xl hover-card-3d">
          <div class="flex-grow flex items-center px-4">
            <svg class="w-6 h-6 text-slate-400 mr-3 flex-shrink-0" fill="none" stroke="currentColor"
              viewBox="0 0 24 24">
              <path
                d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"
                stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
            </svg>
            <input type="email" placeholder="Subscribe to newsletter for updates..."
              class="bg-transparent border-none text-white placeholder-slate-400 focus:ring-0 w-full outline-none h-12"
              required />
          </div>
          <button
            class="px-8 py-3 bg-primary hover:bg-primary-dark text-white font-semibold rounded-xl transition-colors shadow-lg shadow-primary/20 whitespace-nowrap btn-shine magnetic-btn">
            Join Now
          </button>
        </div>
        <p class="text-slate-400 text-xs mt-4">
          Join 500+ engineers. No spam, unsubscribe anytime.
        </p>
      </div>

    </div>
  </section>

  </main>
  <!-- ============================================================
     UPGRADED FOOTER — Canonical Template
     Features:
       • 4-column: Brand | Explore | Resources | Connect
       • Full social icons with brand hover colors in Connect column
       • Back-to-top button (appears after 300px scroll)
       • Auto-updating copyright year via JS
       • Ambient glow orbs & scroll-reveal
     ============================================================ -->

<!-- Back to Top Button -->
<button id="backToTop" aria-label="Back to top"
  class="fixed bottom-8 right-8 z-50 w-12 h-12 rounded-full bg-slate-900 text-white shadow-2xl shadow-slate-900/30 flex items-center justify-center opacity-0 translate-y-4 pointer-events-none transition-all duration-300 hover:bg-primary hover:scale-110 hover:shadow-primary/30 dark:bg-slate-800 dark:hover:bg-primary">
  <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
    <path d="M5 10l7-7m0 0l7 7m-7-7v18" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
  </svg>
</button>

<!-- ============================================================
     FOOTER v2 — Ultra-Premium Canonical Template
     New features over v1:
       • Full-width CTA pre-footer strip with animated gradient
       • Animated tech/tool scrolling marquee tape
       • Newsletter signup with shake validation
       • "Currently building" live status block
       • Footer social icons with brand-glow hover rings
       • Shimmer divider between sections
       • Staggered reveal columns (CSS transitions)
       • Back-to-top button with progress-arc ring
       • Location pin with time zone live clock
     ============================================================ -->
  <div id="site-footer-placeholder"></div>
<!-- Footer & Back-to-Top Scripts -->
<script>
  // Auto copyright year
  var fy = document.getElementById('footerYear');
  if (fy) fy.textContent = new Date().getFullYear();

  // Back to top
  var backToTop = document.getElementById('backToTop');
  if (backToTop) {
    window.addEventListener('scroll', function() {
      if (window.scrollY > 300) {
        backToTop.classList.remove('opacity-0', 'translate-y-4', 'pointer-events-none');
        backToTop.classList.add('opacity-100', 'translate-y-0');
      } else {
        backToTop.classList.add('opacity-0', 'translate-y-4', 'pointer-events-none');
        backToTop.classList.remove('opacity-100', 'translate-y-0');
      }
    }, { passive: true });
    backToTop.addEventListener('click', function() {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
  }
</script>


  <script src="js/includes.js"></script>
</body>
<script src="animations.js" defer></script>

</html>
